name: Frontend Build & Test (React)

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  react-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Menggunakan Node.js v20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Dependencies
      run: npm install # Menggunakan npm install karena terkadang npm ci gagal jika package-lock.json tidak sinkron

    - name: Run Linter (ESLint)
      run: npm run lint
      continue-on-error: true # Workflow akan tetap lanjut meskipun ada peringatan ESLint

    - name: Build Application (Vite)
      run: npm run build
