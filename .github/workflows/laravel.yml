name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    # Trik ini memaksa semua perintah di bawah dijalankan di dalam folder backend
    defaults:
      run:
        working-directory: ./backend

    steps:
    # 1. Unduh kode dari repositori GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Siapkan lingkungan PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3' # Sesuaikan dengan versi PHP projek Anda
        extensions: mbstring, xml, ctype, iconv, intl, pdo, bcmath, zip

    # 3. Duplikat file .env di dalam folder backend
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    # 4. Jalankan Composer Install di dalam folder backend
    - name: Install Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 5. Generate Application Key
    - name: Generate key
      run: php artisan key:generate

    # 6. Atur hak akses folder storage & cache backend
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 7. Buat database SQLite untuk testing
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    # 8. Jalankan test
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
